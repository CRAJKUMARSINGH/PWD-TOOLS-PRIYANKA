<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APG Calculator</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.8em;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.95em;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin: 15px 0 6px;
            font-weight: 600;
            color: #34495e;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border 0.3s;
        }
        input:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #2980b9;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4fc;
            border-radius: 8px;
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            color: #2c3e50;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .example {
            margin-top: 25px;
            font-size: 0.9em;
            color: #7f8c8d;
            text-align: center;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #95a5a6;
            font-size: 0.8em;
        }
        .footer a {
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>APG Calculator</h1>
        <p class="subtitle">50% of savings beyond -15% below G-Schedule</p>
        
        <label for="gsAmount">G-Schedule Amount (₹)</label>
        <input type="number" id="gsAmount" step="0.01" placeholder="e.g. 100.00" required>
        
        <label for="woAmount">Work Order Amount (₹)</label>
        <input type="number" id="woAmount" step="0.01" placeholder="e.g. 80.00" required>
        
        <button id="calcBtn">Calculate APG</button>
        
        <div id="result">Enter values to calculate APG</div>
        
        <div class="example">
            <strong>Example:</strong> G-Schedule = 100, Work Order = 80<br>
            → -20% (5% below -15%) → 5% of 100 = 5 → APG = <strong>3</strong>
        </div>
        
        <div class="footer">
            Built for <a href="https://x.com/crajkumarsingh1" target="_blank">@crajkumarsingh1</a> • <span id="currentTime"></span>
        </div>
    </div>

    <script>
        // Update current time (IST)
        document.getElementById('currentTime').textContent = new Date().toLocaleString('en-IN', {
            timeZone: 'Asia/Kolkata',
            dateStyle: 'medium',
            timeStyle: 'medium'
        });

        document.getElementById('calcBtn').addEventListener('click', function () {
            const gsInput = document.getElementById('gsAmount');
            const woInput = document.getElementById('woAmount');
            const resultDiv = document.getElementById('result');
            
            const gs = parseFloat(gsInput.value);
            const wo = parseFloat(woInput.value);
            
            // Validation
            if (isNaN(gs) || isNaN(wo) || gs <= 0 || wo <= 0) {
                resultDiv.innerHTML = '<span style="color:red;">Please enter valid positive amounts.</span>';
                return;
            }
            
            // Calculate percentage difference
            const percentDiff = ((wo - gs) / gs) * 100;
            let apg = 0;
            
            if (percentDiff < -15) {
                const excessBelow = Math.abs(percentDiff) - 15;  // e.g. 20 - 15 = 5
                const amountBelow = (excessBelow / 100) * gs;   // 5% of 100 = 5
                apg = 0.5 * amountBelow;                        // 50% of 5 = 2.5
            }
            
            // Show result (rounded to nearest integer)
            resultDiv.innerHTML = `APG = <strong>₹${Math.round(apg)}</strong>`;
            
            // Optional: Add animation
            resultDiv.style.animation = 'pulse 0.3s';
            setTimeout(() => resultDiv.style.animation = '', 300);
        });

        // Add pulse animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0% { transform: scale(1); }
                50% { transform: scale(1.05); }
                100% { transform: scale(1); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>

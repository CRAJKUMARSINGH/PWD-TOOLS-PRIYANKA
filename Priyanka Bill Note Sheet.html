<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priyanka Bill Note Sheet</title>
    <style>
        .title {
            font-weight: bold;
            text-decoration: underline;
        }
    </style>
    <script>
        function generateNote() {
            let agreementNumber = document.getElementById("agreementNumber").value;
            let workOrderAmount = parseFloat(document.getElementById("workOrderAmount").value);
            let uptoDateBillAmount = parseFloat(document.getElementById("uptoDateBillAmount").value);
            let startDate = document.getElementById("startDate").value;
            let scheduleCompletion = document.getElementById("scheduleCompletion").value;
            let actualCompletion = document.getElementById("actualCompletion").value;
            let repairWork = document.getElementById("repairWork").value;
            let extraItem = document.getElementById("extraItem").value;
            let extraItemAmount = parseFloat(document.getElementById("extraItemAmount").value) || 0;
            let excessQuantity = document.getElementById("excessQuantity").value;
            let delayComment = document.getElementById("delayComment").value;
            
            // Validation: Ensure all required fields are provided
            if (!agreementNumber || !workOrderAmount || !uptoDateBillAmount || !startDate || !scheduleCompletion || !actualCompletion) {
                alert("Please fill in all the required fields.");
                return;
            }

            // Ensure scheduleCompletion and actualCompletion are valid dates
            scheduleCompletion = new Date(scheduleCompletion);
            actualCompletion = new Date(actualCompletion);
            let startDateParsed = new Date(startDate);

            // Initialize serial number for points
            let serialNumber = 1;
            
            // Work completion percentage
            let percentageWorkDone = (uptoDateBillAmount / workOrderAmount) * 100;
            let note = `${serialNumber}. कार्य ${percentageWorkDone.toFixed(2)} प्रतिशत संपादित हुआ है।\n`;
            serialNumber++;

            // Handling deviations based on work done percentage
            if (percentageWorkDone < 90) {
                note += `${serialNumber}. जिसका डेविएशन स्टेटमेंट भी स्वीकृति हेतु प्राप्त हुआ है, जिसकी स्वीकृति इसी कार्यालय के क्षेत्राधिकार में निहित है।\n`;
            } else if (percentageWorkDone > 100) {
                note += `${serialNumber}. जिसका डेविएशन स्टेटमेंट भी स्वीकृति हेतु प्राप्त हुआ है, OVERALL EXCESS वर्क आर्डर राशि के 5% से कम है जिसकी स्वीकृति इसी कार्यालय के क्षेत्राधिकार में निहित है।\n`;
            }
            serialNumber++;

            // Delay calculation (if applicable)
            let delayDays = Math.floor((actualCompletion - scheduleCompletion) / (1000 * 60 * 60 * 24));
            if (actualCompletion > scheduleCompletion) {
                note += `${serialNumber}. कार्य में ${delayDays} दिन की देरी हुई है।\n`;
                let scheduleDuration = Math.floor((scheduleCompletion - startDateParsed) / (1000 * 60 * 60 * 24));
                if (delayDays > scheduleDuration / 2) {
                    note += `${serialNumber}. टाइम एक्सटेंशन केस Superintending Engineer, Electric Circle कार्यालय द्वारा अनुमोदित किया जाना है।\n`;
                } else {
                    note += `${serialNumber}. टाइम एक्सटेंशन केस इस कार्यालय द्वारा अनुमोदित किया जाना है।\n`;
                }
            } else {
                note += `${serialNumber}. कार्य समय पर संपादित हुआ है।\n`;
            }
            serialNumber++;

            // Extra items handling
            let extraItemPercentage = (extraItemAmount / workOrderAmount) * 100;
            if (extraItem === "Yes") {
                if (extraItemPercentage > 5) {
                    note += `${serialNumber}. कार्य सम्पादन में केवल Rs. ${extraItemAmount.toFixed(2)} अतिरिक्त आइटम सम्पादित किया गया है जिसकी राशि वर्क आर्डर राशि की ${extraItemPercentage.toFixed(2)}% होकर 5% से अधिक है जिसकी स्वीकृति Superintending Engineer, Electric Circle कार्यालय के क्षेत्राधिकार में है।\n`;
                } else {
                    note += `${serialNumber}. कार्य सम्पादन में केवल Rs. ${extraItemAmount.toFixed(2)} अतिरिक्त आइटम सम्पादित किया गया है जिसकी राशि वर्क आर्डर राशि की ${extraItemPercentage.toFixed(2)}% होकर 5% से कम है जिसकी स्वीकृति इस कार्यालय के क्षेत्राधिकार में है।\n`;
                }
            }
            serialNumber++;
            if (excessQuantity === "Yes") {
                if (percentageWorkDone < 100) {
                    note += `${serialNumber}. कार्य संपादन में वर्क ऑर्डर के जिन आइटम्स में EXCESS QUANTITY संपादित की गई है, उनका विवरण संलग्न है। कार्य में saving है (अर्थात Overall Excess = NIL), जिसकी स्वीकृति इस कार्यालय के क्षेत्राधिकार में है।\n`;
                } else if (percentageWorkDone >= 100 && percentageWorkDone < 105) {
                    note += `${serialNumber}. कार्य संपादन में वर्क ऑर्डर के जिन आइटम्स में EXCESS QUANTITY संपादित की गई है, उनका विवरण संलग्न है। कार्य में overall excess = केवल ${percentageWorkDone.toFixed(2) - 100}% होकर 5% से कम है, जिसकी स्वीकृति इस कार्यालय के क्षेत्राधिकार में है।\n`;
                } else {
                    note += `${serialNumber}. कार्य संपादन में वर्क ऑर्डर के जिन आइटम्स में EXCESS QUANTITY संपादित की गई है, उनका विवरण संलग्न है। कार्य में overall excess = ${percentageWorkDone.toFixed(2) - 100}% होकर 5% से अधिक है, जिसकी स्वीकृति Superintending Engineer, Electric Circle कार्यालय के क्षेत्राधिकार में है।\n`;
                }
                serialNumber++;
            }
            // Additional reports
            note += `${serialNumber}. गुणवत्ता नियंत्रण (Q.C.) परीक्षण रिपोर्ट संलग्न हैं।\n`;
            serialNumber++;

            if (repairWork === "No") {
                note += `${serialNumber}. हस्तांतरण विवरण Hand Over Statement संलग्न है।\n`;
                serialNumber++;
            }

            // Bill submission delay comment if "Yes"
            if (delayComment === "Yes") {
                note += `${serialNumber}. कार्य समाप्ति के करीब 6 महीने बाद फाइनल बिल इस कार्यालय में प्रस्तुत किया गया है? इस अप्रत्याशित देरी के लिए सहायक अभियंता से स्पष्टीकरण मांगा जाए, ऐसी प्रस्तावना है।\n`;
                serialNumber++;
            }

            note += `${serialNumber}. उपरोक्त विवरण के सन्दर्भ में समुचित निर्णय हेतु प्रस्तुत है।`;

            // Display the generated note
            document.getElementById("output").innerText = note;
        }
    </script>
</head>
<body>
    <h2 class="title">PRIYANKA BILL NOTE SHEET</h2>
    
    <!-- Input fields -->
    <label>Agreement Number: <input type="number" id="agreementNumber"></label><br>
    <label>Work Order Amount: <input type="number" id="workOrderAmount"></label><br>
    <label>Upto Date Bill Amount: <input type="number" id="uptoDateBillAmount"></label><br>
    <label>Date of Start: <input type="date" id="startDate"></label><br>
    <label>Schedule Date of Completion: <input type="date" id="scheduleCompletion"></label><br>
    <label>Actual Date of Completion: <input type="date" id="actualCompletion"></label><br>
    <label>Repair Work: <select id="repairWork"><option>Yes</option><option>No</option></select></label><br>
    <label>Extra Item: <select id="extraItem"><option>Yes</option><option>No</option></select></label><br>
    <label>If Yes, Amount: <input type="number" id="extraItemAmount"></label><br>
    <label>Excess Quantity: <select id="excessQuantity"><option>Yes</option><option>No</option></select></label><br>
    <label>Bill Submission Delay Comment: <select id="delayComment"><option>Yes</option><option>No</option></select></label><br>
    
    <button onclick="generateNote()">Generate Note</button>
    
    <pre id="output"></pre>
</body>
</html>

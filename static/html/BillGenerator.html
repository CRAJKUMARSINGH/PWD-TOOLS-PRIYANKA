<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Generator Links</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2em;
        }
        p.subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        .tool-card {
            background: #e8f4fc;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #3498db;
        }
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
        }
        .tool-title {
            font-size: 1.4em;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .tool-link {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 12px 25px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            transition: background 0.3s;
            width: 80%;
        }
        .tool-link:hover {
            background: #2980b9;
            text-decoration: none;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #95a5a6;
            font-size: 0.9em;
        }
        .footer a {
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bill Generator Tools</h1>
        <p class="subtitle">Access the available bill generation tools below</p>
        
        <div class="tool-card">
            <div class="tool-title">Bill Generator (Add %)</div>
            <a href="https://bill-priyanka-add-percentage.streamlit.app/" target="_blank" class="tool-link">Launch Tool</a>
        </div>
        
        <div class="tool-card">
            <div class="tool-title">Bill Generator (Online)</div>
            <a href="https://bill-priyanka-online.streamlit.app/" target="_blank" class="tool-link">Launch Tool</a>
        </div>
        
        <div class="footer">
            Part of <a href="http://localhost:8081" target="_blank">PWD Tools Hub</a>
        </div>
    </div>
</body>
</html>

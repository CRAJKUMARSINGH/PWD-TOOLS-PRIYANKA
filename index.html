<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWD Tools Suite v2.0 - Redirecting...</title>
    <meta http-equiv="refresh" content="3;url=https://pwd-tools-priyanka.streamlit.app/">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 4em;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 30px;
        }
        .redirect-message {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 30px;
            padding: 20px;
            background: #f0f4ff;
            border-radius: 10px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 12px;
            text-decoration: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
            margin-top: 20px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e5e7eb;
            color: #666;
            font-size: 0.9em;
        }
        .countdown {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏗️</div>
        <h1>PWD Tools Suite v2.0</h1>
        <p class="subtitle">Professional Infrastructure Management Tools</p>
        
        <div class="redirect-message">
            <strong>🚀 Redirecting to Application...</strong>
            <div class="countdown" id="countdown">3</div>
            <div class="spinner"></div>
        </div>

        <a href="https://pwd-tools-priyanka.streamlit.app/" class="btn">
            Click Here if Not Redirected
        </a>

        <div class="info">
            <p><strong>13 Professional Tools</strong> | Production Ready | v2.0.1</p>
            <p style="margin-top: 10px;">Public Works Department, Udaipur, Rajasthan</p>
        </div>
    </div>

    <script>
        // Countdown timer
        let seconds = 3;
        const countdownElement = document.getElementById('countdown');
        
        const countdown = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(countdown);
                countdownElement.textContent = 'Redirecting...';
                window.location.href = 'https://pwd-tools-priyanka.streamlit.app/';
            }
        }, 1000);

        // Immediate redirect for users who prefer it
        // Uncomment the line below for instant redirect (no countdown)
        // window.location.href = 'https://pwd-tools-priyanka.streamlit.app/';
    </script>
</body>
</html>
